name: release-artifacts

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source artifact
        run: |
          tar -czf fullstack-agent-skills.tar.gz \
            README.md skills-index.md skills presets references templates starter-packs docs agents registry scripts .cursor
      - uses: actions/upload-artifact@v4
        with:
          name: fullstack-agent-skills
          path: fullstack-agent-skills.tar.gz
