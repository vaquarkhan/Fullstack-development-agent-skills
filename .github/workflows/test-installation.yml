name: test-installation

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-install-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test shell installer
        run: |
          chmod +x scripts/install.sh
          TARGET=/tmp/fullstack-skill-install
          ./scripts/install.sh all "$TARGET"
          python scripts/verify-install-output.py "$TARGET"

  test-install-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test shell installer
        run: |
          chmod +x scripts/install.sh
          TARGET=/tmp/fullstack-skill-install
          ./scripts/install.sh all "$TARGET"
          python3 scripts/verify-install-output.py "$TARGET"

  test-install-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test PowerShell installer
        shell: pwsh
        run: |
          $target = Join-Path $env:RUNNER_TEMP "fullstack-skill-install"
          ./scripts/install.ps1 -Tool all -Target $target
          python scripts/verify-install-output.py $target
