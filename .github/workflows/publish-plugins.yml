name: Publish Plugins

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.5.0)'
        required: true
        default: '0.5.0'

jobs:
  build-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install and package VS Code extension
        working-directory: vscode-extension
        run: |
          npm install
          npm run package

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        working-directory: vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-vsix
          path: vscode-extension/*.vsix

  build-jetbrains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build JetBrains plugin
        working-directory: jetbrains-plugin
        run: ./gradlew buildPlugin

      - name: Publish to JetBrains Marketplace
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        working-directory: jetbrains-plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: jetbrains-plugin-zip
          path: jetbrains-plugin/build/distributions/*.zip
