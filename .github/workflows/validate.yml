name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-markdown-and-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate JSON files
        run: |
          python -m json.tool registry/assets.json > /dev/null
      - name: Check required index files
        run: |
          test -f README.md
          test -f skills-index.md
      - name: Validate skills structure
        run: python scripts/validate-skills.py
      - name: Check skill boilerplate
        run: python scripts/check-skill-boilerplate.py
      - name: Validate registry assets
        run: python scripts/validate-assets.py
      - name: Validate version sync
        run: python scripts/validate-version-sync.py
      - name: Run skill routing benchmark
        run: python scripts/run-skill-routing-benchmark.py
      - name: Validate reference provenance
        run: python scripts/validate-reference-provenance.py

  validate-vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci
      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile
