name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-markdown-and-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          python -m json.tool registry/assets.json > /dev/null
      - name: Check required index files
        run: |
          test -f README.md
          test -f skills-index.md
      - name: Validate skills structure
        run: python scripts/validate-skills.py
      - name: Check skill boilerplate
        run: python scripts/check-skill-boilerplate.py
      - name: Validate registry assets
        run: python scripts/validate-assets.py
      - name: Validate version sync
        run: python scripts/validate-version-sync.py
